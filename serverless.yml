service: xoc-api-core

frameworkVersion: '4'

plugins:
  - serverless-python-requirements

custom:
  stage: ${opt:stage, 'dev'}
  stageConfig: ${file(./serverless/stages/${self:custom.stage}.yml)}
  pythonRequirements:
    dockerizePip: false
    slim: true
    layer: false

provider:
  name: aws
  runtime: python3.12
  architecture: arm64
  stage: ${self:custom.stage}
  region: ${self:custom.stageConfig.region}
  logRetentionInDays: ${self:custom.stageConfig.logRetentionInDays}
  tracing:
    lambda: true
  environment:
    APP_STAGE: ${self:custom.stage}
    APP_REGION: ${aws:region}
    POWERTOOLS_SERVICE_NAME: ${self:service}
    POWERTOOLS_LOG_LEVEL: ${self:custom.stageConfig.logLevel}
    POWERTOOLS_METRICS_NAMESPACE: XOC/API
    JWT_SECRET_KEY_SSM_PATH: ${self:custom.stageConfig.jwtSecretKeySsmPath}
    DATABASE_SECRET_ARN: ${self:custom.stageConfig.databaseSecretArn}
    SNAPSHOTS_BUCKET_NAME: ${self:custom.stageConfig.snapshotsBucketName}
    CORS_ALLOWED_ORIGINS: ${self:custom.stageConfig.corsAllowedOriginsCsv}
    EVENT_BUS_NAME: ${self:service}-${self:custom.stage}-bus
  httpApi:
    cors:
      allowedOrigins: ${self:custom.stageConfig.corsAllowedOrigins}
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Request-Id
        - X-Superadmin-Confirm
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      exposedResponseHeaders:
        - X-Request-Id
      allowCredentials: true
    authorizers:
      jwtRequestAuthorizer:
        type: request
        functionName: jwtAuthorizer
        enableSimpleResponses: true
        identitySource:
          - $request.header.Authorization
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ssm:GetParameter
          Resource:
            - arn:aws:ssm:${aws:region}:${aws:accountId}:parameter${self:custom.stageConfig.jwtSecretKeySsmPath}
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - ${self:custom.stageConfig.databaseSecretArn}
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
          Resource:
            - ${self:custom.stageConfig.snapshotsBucketArn}/*
        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource:
            - ${self:custom.stageConfig.snapshotsBucketArn}
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - arn:aws:events:${aws:region}:${aws:accountId}:event-bus/${self:service}-${self:custom.stage}-bus
        - Effect: Allow
          Action:
            - ec2:CreateNetworkInterface
            - ec2:DescribeNetworkInterfaces
            - ec2:DeleteNetworkInterface
            - ec2:AssignPrivateIpAddresses
            - ec2:UnassignPrivateIpAddresses
          Resource: '*'

package:
  individually: true
  patterns:
    - '!node_modules/**'
    - '!package-lock.json'
    - '!README.md'
    - '!tests/**'
    - '!txdxai_Flask/**'

functions: ${file(./serverless/functions.yml)}
resources: ${file(./serverless/resources.yml)}
