service: xoc-api-core

frameworkVersion: '4'

custom:
  stage: ${opt:stage, 'dev'}
  stageConfig: ${file(./serverless/stages/${self:custom.stage}.yml)}
  functionsFileByStage:
    dev: ./serverless/functions.yml
    staging: ./serverless/functions.yml
    prod: ./serverless/functions-prod.yml

  pythonRequirements:
    dockerizePip: true
    slim: true
    layer: false
    useDownloadCache: true
    useStaticCache: true

provider:
  name: aws
  runtime: python3.12
  architecture: x86_64
  stage: ${self:custom.stage}
  region: ${self:custom.stageConfig.region}

  logRetentionInDays: ${self:custom.stageConfig.logRetentionInDays}

  tracing:
    lambda: true

  environment:
    APP_STAGE: ${self:custom.stage}
    APP_REGION: ${aws:region}

    POWERTOOLS_SERVICE_NAME: ${self:service}
    POWERTOOLS_LOG_LEVEL: ${self:custom.stageConfig.logLevel}
    POWERTOOLS_METRICS_NAMESPACE: XOC/API

    JWT_SECRET_KEY: ${self:custom.stageConfig.jwtSecretKey}
    DATABASE_SECRET_ARN: ${self:custom.stageConfig.databaseSecretArn}
    SNAPSHOTS_BUCKET_NAME: ${self:custom.stageConfig.snapshotsBucketName}
    CORS_ALLOWED_ORIGINS: ${self:custom.stageConfig.corsAllowedOriginsCsv}
    AGENTS_FUNCTION_BASE_URL: ${self:custom.stageConfig.agentsFunctionBaseUrl}
    AGENTS_FUNCTION_ROUTE_SOPHIA: ${self:custom.stageConfig.agentsFunctionRouteSophia}
    AGENTS_FUNCTION_ROUTE_SOPHIA_HISTORY: ${self:custom.stageConfig.agentsFunctionRouteSophiaHistory}
    AGENTS_FUNCTION_ROUTE_SOPHIA_DELETE: ${self:custom.stageConfig.agentsFunctionRouteSophiaDelete}
    AGENTS_FUNCTION_ROUTE_VICTOR: ${self:custom.stageConfig.agentsFunctionRouteVictor}

    EVENT_BUS_NAME: ${self:service}-${self:custom.stage}-bus
    TICKETS_TABLE_NAME: ${self:service}-${self:custom.stage}-tickets

    AGENT_KEY_ENCRYPTION_KEY: ${env:AGENT_KEY_ENCRYPTION_KEY, ''}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - ${self:custom.stageConfig.databaseSecretArn}
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
          Resource:
            - ${self:custom.stageConfig.snapshotsBucketArn}/*
        - Effect: Allow
          Action:
            - s3:ListBucket
          Resource:
            - ${self:custom.stageConfig.snapshotsBucketArn}
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - arn:aws:events:${aws:region}:${aws:accountId}:event-bus/${self:service}-${self:custom.stage}-bus
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource:
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:service}-${self:custom.stage}-tickets
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:service}-${self:custom.stage}-tickets/index/*
        - Effect: Allow
          Action:
            - ec2:CreateNetworkInterface
            - ec2:DescribeNetworkInterfaces
            - ec2:DeleteNetworkInterface
            - ec2:AssignPrivateIpAddresses
            - ec2:UnassignPrivateIpAddresses
          Resource: '*'

  httpApi:
    cors:
      allowedOrigins: ${self:custom.stageConfig.corsAllowedOrigins}
      allowedHeaders:
        - Content-Type
        - Authorization
        - X-Request-Id
        - X-Superadmin-Confirm
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      exposedResponseHeaders:
        - X-Request-Id
      allowCredentials: true

    authorizers:
      jwtRequestAuthorizer:
        type: request
        functionName: jwtAuthorizer
        enableSimpleResponses: true
        identitySource:
          - $request.header.Authorization

package:
  individually: true
  patterns:
    - '!node_modules/**'
    - '!package-lock.json'
    - '!README.md'
    - '!tests/**'
    - '!txdxai_Flask/**'
    - '!.git/**'
    - '!.opencode/**'
    - '!__pycache__/**'
    - '!**/__pycache__/**'
    - '!*.pyc'
    - '!**/*.pyc'

functions: ${file(${self:custom.functionsFileByStage.${self:custom.stage}})}

resources: ${file(./serverless/resources.yml)}
