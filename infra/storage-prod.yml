AWSTemplateFormatVersion: '2010-09-09'
Description: XOC production S3 storage for heavy snapshots.

Parameters:
  BucketName:
    Type: String
    Default: ''

Conditions:
  UseCustomBucketName: !Not [!Equals [!Ref BucketName, '']]

Resources:
  SnapshotsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - UseCustomBucketName
        - !Ref BucketName
        - !Sub 'xoc-prod-snapshots-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  SnapshotsBucketName:
    Value: !Ref SnapshotsBucket
  SnapshotsBucketArn:
    Value: !GetAtt SnapshotsBucket.Arn
