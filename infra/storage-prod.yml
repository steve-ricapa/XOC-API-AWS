AWSTemplateFormatVersion: '2010-09-09'
Description: XOC production S3 storage for heavy snapshots.

Parameters:
  BucketName:
    Type: String
    Default: ''

Conditions:
  UseCustomBucketName: !Not [!Equals [!Ref BucketName, '']]

Resources:
  SnapshotsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - UseCustomBucketName
        - !Ref BucketName
        - !Sub 'xoc-prod-snapshots-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: TransitionCurrentSnapshotsToIntelligentTiering
            Status: Enabled
            Filter:
              Prefix: ''
            Transitions:
              - TransitionInDays: 30
                StorageClass: INTELLIGENT_TIERING
          - Id: ExpireNoncurrentSnapshotVersions
            Status: Enabled
            Filter:
              Prefix: ''
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
            NoncurrentVersionTransitions:
              - NoncurrentDays: 30
                StorageClass: STANDARD_IA

Outputs:
  SnapshotsBucketName:
    Value: !Ref SnapshotsBucket
  SnapshotsBucketArn:
    Value: !GetAtt SnapshotsBucket.Arn
