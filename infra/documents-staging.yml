AWSTemplateFormatVersion: '2010-09-09'
Description: XOC staging S3 storage for generated documents.

Resources:
  XocDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'xoc-staging-documents-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
  TxdxDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'txdx-staging-documents-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

Outputs:
  XocDocumentsBucketName:
    Value: !Ref XocDocumentsBucket
  XocDocumentsBucketArn:
    Value: !GetAtt XocDocumentsBucket.Arn
  TxdxDocumentsBucketName:
    Value: !Ref TxdxDocumentsBucket
  TxdxDocumentsBucketArn:
    Value: !GetAtt TxdxDocumentsBucket.Arn
