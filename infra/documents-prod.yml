AWSTemplateFormatVersion: '2010-09-09'
Description: XOC production S3 storage for generated documents.

Resources:
  XocDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'xoc-prod-documents-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: TransitionCurrentDocumentsToIntelligentTiering
            Status: Enabled
            Filter:
              Prefix: ''
            Transitions:
              - TransitionInDays: 30
                StorageClass: INTELLIGENT_TIERING
          - Id: ExpireNoncurrentDocumentVersions
            Status: Enabled
            Filter:
              Prefix: ''
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
            NoncurrentVersionTransitions:
              - NoncurrentDays: 30
                StorageClass: STANDARD_IA
  TxdxDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'txdx-prod-documents-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: TransitionCurrentDocumentsToIntelligentTiering
            Status: Enabled
            Filter:
              Prefix: ''
            Transitions:
              - TransitionInDays: 30
                StorageClass: INTELLIGENT_TIERING
          - Id: ExpireNoncurrentDocumentVersions
            Status: Enabled
            Filter:
              Prefix: ''
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
            NoncurrentVersionTransitions:
              - NoncurrentDays: 30
                StorageClass: STANDARD_IA

Outputs:
  XocDocumentsBucketName:
    Value: !Ref XocDocumentsBucket
  XocDocumentsBucketArn:
    Value: !GetAtt XocDocumentsBucket.Arn
  TxdxDocumentsBucketName:
    Value: !Ref TxdxDocumentsBucket
  TxdxDocumentsBucketArn:
    Value: !GetAtt TxdxDocumentsBucket.Arn
