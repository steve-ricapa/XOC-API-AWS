region: us-east-1
logLevel: INFO
logRetentionInDays: 90
corsAllowedOrigins:
  - https://api.example.com
corsAllowedOriginsCsv: https://api.example.com
jwtSecretKeySsmPath: /xoc/api/prod/jwt-secret-key
databaseSecretArn: ${cf:xoc-infra-data-prod.DatabaseSecretArn}
databaseUrlSsmPath: ${cf:xoc-infra-data-prod.DatabaseUrlSsmPath}
snapshotsBucketName: ${cf:xoc-infra-storage-prod.SnapshotsBucketName}
snapshotsBucketArn: ${cf:xoc-infra-storage-prod.SnapshotsBucketArn}
apiVpc:
  securityGroupIds:
    - ${cf:xoc-infra-network-prod.LambdaSecurityGroupId}
  subnetIds:
    - ${cf:xoc-infra-network-prod.LambdaPrivateSubnetAId}
    - ${cf:xoc-infra-network-prod.LambdaPrivateSubnetBId}
