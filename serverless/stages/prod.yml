region: us-east-1
logLevel: INFO
logRetentionInDays: 90
corsAllowedOrigins:
  - "*"
corsAllowedOriginsCsv: "*"
jwtSecretKey: xoc-demo-prod-jwt-secret-change-me
databaseSecretArn: ${env:DATABASE_SECRET_ARN, 'xoc/api/prod/database'}
snapshotsBucketName: ${env:SNAPSHOTS_BUCKET_NAME, 'xoc-prod-snapshots-${aws:accountId}'}
snapshotsBucketArn: ${env:SNAPSHOTS_BUCKET_ARN, 'arn:aws:s3:::xoc-prod-snapshots-${aws:accountId}'}
apiVpc:
  securityGroupIds:
    - ${env:LAMBDA_SECURITY_GROUP_ID}
  subnetIds:
    - ${env:LAMBDA_PRIVATE_SUBNET_A_ID}
    - ${env:LAMBDA_PRIVATE_SUBNET_B_ID}
