jwtAuthorizer:
  handler: src/handlers/authorizers/jwt_authorizer.handler
  name: ${self:service}-${self:custom.stage}-jwt-authorizer
  description: Custom JWT request authorizer for XOC API
  memorySize: 256
  timeout: 10
  package:
    patterns:
      - src/**
      - requirements.txt

authApi:
  handler: src/handlers/domains/auth.handler
  name: ${self:service}-${self:custom.stage}-auth
  description: Auth & health domain API
  memorySize: 512
  timeout: 20
  events:
    - httpApi:
        method: GET
        path: /health
    - httpApi:
        method: POST
        path: /auth/register
    - httpApi:
        method: POST
        path: /auth/login
    - httpApi:
        method: POST
        path: /auth/refresh
        authorizer: jwtRequestAuthorizer
    - httpApi:
        method: POST
        path: /onboarding/tenant
  package:
    patterns:
      - src/**
      - requirements.txt

